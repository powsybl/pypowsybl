name: Dev CI

on:
  pull_request:

permissions: { }

jobs:
  manylinux_build:
    name: Build ${{ matrix.config.name }} wheel
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: read
    container: quay.io/pypa/manylinux_2_28_x86_64:2026.03.09-1
    strategy:
      matrix:
        config:
          - {
            name: linux,
            os: ubuntu-latest,
          }
        python:
          - {
            name: cp310,
            abi: cp310,
            version: '3.10',
          }

    steps:
      - name: Install Linux Packages
        run: dnf install -y wget

      - name: Install Maven
        run: |
          wget -q https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.14/apache-maven-3.9.14-bin.tar.gz -P /tmp
          tar xf /tmp/apache-maven-*.tar.gz -C /opt
          echo /opt/apache-maven-3.9.14/bin >> $GITHUB_PATH

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1.5.2
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup path
        run: echo "/opt/python/${{ matrix.python.name }}-${{ matrix.python.abi }}/bin/" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Build wheel
        run: |
          python3 setup.py bdist_wheel
          auditwheel repair dist/*.whl

      - name: Install wheel
        run: pip3 install wheelhouse/*.whl --user

      - name: Run basic pypowsybl import
        working-directory: ./tests
        run: python3 basic_import_test.py

      - name: Run tests
        working-directory: ./tests # Run in subdir to use installed lib, not sources
        run: |
          pytest

      - name: Type checking
        run: mypy -p pypowsybl

      - name: Dev install  # In order to generate coverage and linting, we need to install in sources
        run: |
          pip3 uninstall -y pypowsybl
          python3 setup.py develop

      - name: Generate coverage
        run: |
          coverage run -m pytest tests/
          coverage xml

      - name: Linting
        run: pylint pypowsybl

      - name: Sonar analysis
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Run doc examples
        working-directory: ./docs
        run: make html doctest SPHINXOPTS="-W"

      - name: Test standalone cpp build
        shell: bash
        working-directory: ./dist
        run: | #Unzip binaries.zip produced by setup.py and try to build only the cpp API and bindings with it
          unzip binaries.zip && mkdir build && cd build
          cmake $GITHUB_WORKSPACE/cpp  -DBUILD_PYPOWSYBL_JAVA=OFF -DPYPOWSYBL_JAVA_LIBRARY_DIR=$GITHUB_WORKSPACE/dist/lib -DPYPOWSYBL_JAVA_INCLUDE_DIR=$GITHUB_WORKSPACE/dist/include
          cmake --build . --config Release

  macos_windows_build:
    name: Build ${{ matrix.config.name }} wheel
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        config:
          - {
            name: darwin,
            os: macos-15-intel,
            macosx_deployment_target: "10.16", # to ensure pip finds wheel when Big Sur is configured to return 10.16 as version instead of 11.0
            bdist_wheel_args: "--plat-name macosx-11.0-x86_64", # needed to avoid the wheel to be named -universal2
          }
          - {
            name: windows,
            os: windows-2022,
          }
        python:
          - {
            name: cp310,
            version: '3.10',
          }

    steps:
      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1.5.2
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python.version }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build wheel
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.config.macosx_deployment_target }}
        run: python setup.py bdist_wheel ${{ matrix.config.bdist_wheel_args }}

      - name: Install wheel
        shell: bash
        run: python -m pip install dist/*.whl --user

      - name: Run basic pypowsybl import
        working-directory: ./tests
        run: python3 basic_import_test.py

      - name: Run tests
        working-directory: ./tests
        run: python3 -m pytest

      - name: Type checking
        run: mypy -p pypowsybl

      - name: Run doc examples
        working-directory: ./docs
        run: make html doctest SPHINXOPTS="-W"

      - name: Test standalone cpp build
        shell: bash
        working-directory: ./dist
        run: | #Unzip binaries.zip produced by setup.py and try to build only the cpp API and bindings with it
          unzip binaries.zip && mkdir build && cd build
          cmake $GITHUB_WORKSPACE/cpp  -DBUILD_PYPOWSYBL_JAVA=OFF -DPYPOWSYBL_JAVA_LIBRARY_DIR=$GITHUB_WORKSPACE/dist/lib -DPYPOWSYBL_JAVA_INCLUDE_DIR=$GITHUB_WORKSPACE/dist/include
          cmake --build . --config Release

  sonar_java:
    name: Run SonarCloud analysis for Java code
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven (Ubuntu)
        working-directory: ./java
        run: >
          mvn -B -ntp -Pjacoco install

      - name: Run SonarCloud analysis
        working-directory: ./java
        run: >
          mvn -B -ntp -DskipTests sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=powsybl-ci-github
          -Dsonar.projectKey=powsybl_pypowsybl-java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
